{{- range .Values.services }}
{{- if .ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .name }}-service
  annotations:
    {{- range $key, $value := .ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  labels:
    app: {{ .name }}
spec:
  ingressClassName: {{ .ingress.ingressClassName | quote }}
  rules:
  {{- if .ingress.host }}
  - host: {{ .ingress.host }}
    http:
      paths:
      - path: {{ .ingress.path_regex }}
        pathType: Prefix
        backend:
          service:
            name: {{ .name }}-service
            port:
              number: {{ .port | default 80 }}
      {{- if .ingress.specific_paths }}
      - path: {{ .ingress.specific_paths.docs_path }}
        pathType: Prefix
        backend:
          service:
            name: {{ .name }}-service
            port:
              number: {{ .port | default 80 }}
      - path: {{ .ingress.specific_paths.docs_json_path }}
        pathType: Prefix
        backend:
          service:
            name: {{ .name }}-service
            port:
              number: {{ .port | default 80 }}
      {{- end }}
  {{- end }}
{{- end }}
---
{{- end }}