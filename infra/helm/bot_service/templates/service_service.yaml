{{- range .Values.services }}
{{- if .service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}-service
  labels:
    app: {{ .name }}
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: {{ .port }}
    protocol: TCP
  selector:
    app: {{ .name }}
---
{{- end }}
{{- end }}
